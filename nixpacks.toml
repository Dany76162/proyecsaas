# Nixpacks configuration for Railway
# IMPORTANT: combine npm install + pnpm install in ONE command so pnpm
# is available in PATH within the same Docker RUN layer.

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
# pnpm@10 matches the lockfile format (generated locally by pnpm v10.26.1)
# --no-frozen-lockfile avoids LOCKFILE_CONFIG_MISMATCH errors
cmds = [
  "npm install -g pnpm@10 && pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/proyecsaas exec prisma generate && pnpm --filter @workspace/proyecsaas run build"
]

[start]
# PORT is injected by Railway automatically.
# next start reads PORT from process.env; -H 0.0.0.0 binds all interfaces.
# Using ; so a slow/failed migration never blocks server startup.
cmd = "pnpm --filter @workspace/proyecsaas exec prisma migrate deploy; pnpm --filter @workspace/proyecsaas run start"
