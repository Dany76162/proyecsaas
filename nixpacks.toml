# Nixpacks configuration for Railway (proyecsaas service)
#
# KEY: do NOT set "packageManager" in root package.json.
# That field causes Nixpacks to abandon Nix mode and generate
# "npm install -g pnpm" which fails because npm's global bin
# is not on PATH in the Nix environment.
#
# Instead: add nodePackages.pnpm to nixPkgs — Nix installs pnpm
# directly into the Nix profile which IS on PATH for all phases.

[phases.setup]
nixPkgs = ["nodejs_22", "openssl", "nodePackages.pnpm"]

[phases.install]
# --no-frozen-lockfile: handles pnpm version differences between local (v10)
#   and whatever Nix provides — allows lockfile to be regenerated if needed
# --prefer-offline: uses BuildKit pnpm cache; avoids minimumReleaseAge checks
cmds = ["pnpm install --no-frozen-lockfile --prefer-offline"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/proyecsaas exec prisma generate && pnpm --filter @workspace/proyecsaas run build"
]

[start]
# PORT is injected by Railway; next start reads it from process.env.
# -H 0.0.0.0 binds all interfaces. ; so migration failure never blocks start.
cmd = "pnpm --filter @workspace/proyecsaas exec prisma migrate deploy; pnpm --filter @workspace/proyecsaas run start"
