# Nixpacks configuration for Railway
# Build from monorepo root — pnpm workspace handles path resolution

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = [
  "npm install -g pnpm@9",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/proyecsaas exec prisma generate",
  "pnpm --filter @workspace/proyecsaas run build"
]

[start]
# PORT is injected by Railway automatically.
# next start reads PORT from process.env; -H 0.0.0.0 binds all interfaces.
# Using ; so a slow/failed migration never blocks server startup.
cmd = "pnpm --filter @workspace/proyecsaas exec prisma migrate deploy; pnpm --filter @workspace/proyecsaas run start"
